name: ATHENA 4H Scan

on:
  schedule:
    # 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
    - cron: '0 */4 * * *' 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # IZIN WAJIB UNTUK UPDATE LOG
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Update ke v4

      - name: Setup Python
        uses: actions/setup-python@v5 # Update ke v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt

      - name: Run ATHENA
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Save Logs and Data
        run: |
          git config --global user.name "Athena-Bot"
          git config --global user.email "athena@bot.com"
          if [ -f data/predictions_log.csv ]; then
            git add data/predictions_log.csv
            git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update predictions log [skip ci]"
            git push
          else
            echo "No predictions log found"
          fi
